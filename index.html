<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameScope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=35" />
  </head>
  <body>
    <div class="fx fx--grid" aria-hidden="true"></div>
    <div class="fx fx--scan" aria-hidden="true"></div>
    <div class="fx fx--vignette" aria-hidden="true"></div>

    <div class="app">
      <aside class="rail" id="rail-root" aria-label="分类">
        <button
          type="button"
          class="rail__lang"
          id="lang-toggle"
          aria-label="切换到英语"
        >
          English
        </button>
        <nav id="sidebar" class="rail__nav" aria-label="游戏分类"></nav>
      </aside>
      <main class="stage">
        <div class="stage__scroll">
          <div id="home-root" class="home" hidden></div>
          <div id="library-root" class="list" hidden></div>
        </div>
      </main>
    </div>

    <script src="games.js?v=35" defer></script>
  </body>
</html>
