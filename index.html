<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameScope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=8" />
  </head>
  <body>
    <div class="fx fx--grid" aria-hidden="true"></div>
    <div class="fx fx--scan" aria-hidden="true"></div>
    <div class="fx fx--vignette" aria-hidden="true"></div>

    <div class="app">
      <aside id="sidebar" class="rail" aria-label="分类"></aside>
      <main class="stage">
        <div class="stage__scroll">
          <div id="library-root" class="list"></div>
        </div>
        <footer class="dock" id="save-dock">
          <div class="dock__inner">
            <label class="dock__field">
              <span class="dock__key">API</span>
              <input
                id="dock-api"
                class="dock__input"
                type="url"
                inputmode="url"
                autocomplete="off"
                spellcheck="false"
                placeholder="http://127.0.0.1:3456"
              />
            </label>
            <label class="dock__field">
              <span class="dock__key">TOKEN</span>
              <input
                id="dock-token"
                class="dock__input"
                type="password"
                autocomplete="off"
                spellcheck="false"
                placeholder="可选"
              />
            </label>
            <button type="button" class="dock__btn" id="dock-save">
              保存评价
            </button>
            <p class="dock__status" id="dock-status" aria-live="polite"></p>
          </div>
        </footer>
      </main>
    </div>

    <script src="api-config.js?v=8"></script>
    <script src="games.js?v=8" defer></script>
  </body>
</html>
